<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Da4lions Pay-tec</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/lion-logo-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/lion-logo-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/lion-logo-180.png?v=2" />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="container auth-shell">
      <section class="card auth-card">
        <div class="brand brand-mark" style="justify-content:center; margin-bottom:0.65rem;">
          <img src="/assets/da4lions-logo.jpeg" alt="Da4lions Pay-tec logo" class="brand-logo" />
          <span class="brand-copy">Da4lions Pay-tec</span>
        </div>
        <h1>Reset Password</h1>
        <p class="auth-subtitle">
          Enter your username and request an email OTP. Then use that OTP to set a new strong password.
        </p>
        <p class="auth-subtitle">The OTP is sent to the email saved in your profile.</p>
        <p id="resetStatus" class="auth-subtitle" hidden></p>
        <form id="passwordResetForm" class="auth-form">
          <label for="resetUsername">Username</label>
          <input id="resetUsername" name="username" type="text" minlength="3" maxlength="40" pattern="[A-Za-z0-9/_-]+" required />
          <button id="sendOtpButton" type="button" class="btn btn-secondary">Send OTP</button>

          <label for="resetOtpCode">Email OTP</label>
          <input id="resetOtpCode" name="otpCode" type="text" inputmode="numeric" pattern="[0-9]{4,8}" minlength="4" maxlength="8" required />

          <label for="resetNewPassword">New password</label>
          <input id="resetNewPassword" name="newPassword" type="password" minlength="10" maxlength="72" required />

          <label for="resetConfirmPassword">Confirm new password</label>
          <input id="resetConfirmPassword" name="confirmPassword" type="password" minlength="10" maxlength="72" required />

          <button type="submit" class="btn">Reset password</button>
        </form>
        <p class="auth-help"><a href="/login">Back to login</a></p>
      </section>
    </main>
    <script src="/assets/csrf.js"></script>
    <script src="/assets/forgot-password.js"></script>
  </body>
</html>
