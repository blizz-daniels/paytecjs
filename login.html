<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Login | Da4lions Pay-tec</title>
    <meta name="description" content="Da4lions Pay-tec login for students, lecturers, and admins." />
    <meta name="robots" content="index,follow" />
        <link rel="icon" type="image/png" sizes="32x32" href="/assets/lion-logo-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/lion-logo-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/lion-logo-180.png?v=2" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <main class="container auth-shell">
      <section class="card auth-card">
        <div class="brand brand-mark" style="justify-content:center; margin-bottom:0.65rem;">
          <img src="/assets/da4lions-logo.jpeg" alt="Da4lions Pay-tec logo" class="brand-logo" />
          <span class="brand-copy">Da4lions Pay-tec</span>
        </div>
        <h1>Portal Login</h1>
        <p class="auth-subtitle">Students use matric number, lecturers use lecturer code. Use surname in lowercase unless you already set a custom password.</p>
        <p id="authError" class="auth-error" hidden></p>
        <form method="post" action="/login" class="auth-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" minlength="3" maxlength="40" pattern="[A-Za-z0-9/_-]+" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="2" maxlength="72" required />
          <input type="hidden" name="_csrf" value="" />

          <button type="submit" class="btn">Log in</button>
        </form>
        <p class="auth-help"><a href="/forgot-password">Forgot Password?</a></p>
        <p class="auth-help">Accounts are provisioned by admin roster upload.</p>
      </section>
    </main>
    <script src="assets/csrf.js"></script>
    <script src="assets/auth.js"></script>
  </body>
</html>
