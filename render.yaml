databases:
  - name: paytec-db
    plan: free

services:
  - type: web
    name: paytec
    runtime: node
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: paytec-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /tmp/paytec
      - key: RECEIPT_OUTPUT_DIR
        value: /tmp/paytec/approved-receipts
      - key: RATE_LIMIT_PRUNE_INTERVAL_MS
        value: 300000
      - key: MEMORY_LOG_INTERVAL_MS
        value: 300000
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: STUDENT_ROSTER_PATH
        value: /opt/render/project/src/data/students.csv
      - key: LECTURER_ROSTER_PATH
        value: /opt/render/project/src/data/teachers.csv
